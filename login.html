<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In - Easymail</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="auth-page">
    <div class="auth-layout">
      <div class="auth-left">
        <div class="auth-left__container">
          <a href="index.html" class="auth-logo">Easymail</a>

          <h1 class="auth-title">Welcome back to Easymail</h1>

          <form id="loginForm" class="auth-form">
            <div class="form-group">
              <input
                type="email"
                id="loginEmail"
                placeholder="Email"
                required
                class="form-input"
              />
            </div>
            <div class="form-group">
              <input
                type="password"
                id="loginPassword"
                placeholder="Password"
                required
                class="form-input"
              />
            </div>

            <button
              type="submit"
              id="loginBtn"
              class="btn btn-yellow btn-pill auth-btn"
            >
              LOG IN
            </button>

            <p id="loginError" class="error-text" style="display: none"></p>
          </form>

          <p class="auth-switch">
            Don't have an account?
            <a href="register.html" class="auth-link">Sign up</a>
          </p>
        </div>
      </div>

      <div class="auth-right">
        <div class="auth-right__overlay"></div>
        <div class="auth-right__content">
          <h2 class="auth-right__title">
            All-in-one<br />
            <span class="highlight-auth">online marketing platform</span><br />
            to grow your business
          </h2>

          <div class="auth-features">
            <div class="auth-feature">
              <img
                src="assets/img/email-icon.png"
                alt=""
                class="auth-feature__icon"
              />
              <p>Unlimited<br />email marketing</p>
            </div>
            <div class="auth-feature">
              <img
                src="assets/img/space.png"
                alt=""
                class="auth-feature__icon"
              />
              <p>Space for up to<br />500 contacts</p>
            </div>
            <div class="auth-feature">
              <img
                src="assets/img/reglar.png"
                alt=""
                class="auth-feature__icon"
              />
              <p>AI-powered code<br />-free website builder</p>
            </div>
            <div class="auth-feature">
              <img
                src="assets/img/signup.png"
                alt=""
                class="auth-feature__icon"
              />
              <p>Signup forms<br />and popup</p>
            </div>
            <div class="auth-feature">
              <img
                src="assets/img/bx_camera-home.png"
                alt=""
                class="auth-feature__icon"
              />
              <p>Highly Ranging<br />webinar</p>
            </div>
            <div class="auth-feature">
              <img
                src="assets/img/funnel.png"
                alt=""
                class="auth-feature__icon"
              />
              <p>Automated funnel</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="assets/js/auth.js"></script>
  </body>
</html>
